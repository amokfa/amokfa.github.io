<!DOCTYPE html>
<html lang="en">
<head>
<script>
(function () {
    var theme = 'dark'
    try {
        if (localStorage.getItem('theme') === 'light') {
            theme = 'light'
        }
    } catch (e) {
    }
    var bg = theme === 'light' ? '#fcfdf7' : '#383838'
    document.documentElement.dataset.theme = theme
    document.documentElement.style.setProperty('--page-load-overlay-bg', bg)
})()
</script>
</head>
<body>
<div id="page_load_overlay" style="position:fixed;inset:0;z-index:2147483647;pointer-events:none;opacity:1;transition:opacity 220ms ease, visibility 0s linear 220ms;background:var(--page-load-overlay-bg, #383838);"></div>
<article>
  <h2>Introduction</h2>
  <p>
    <a>Asset engine</a> is a tool for generating graphics assets. It isn't a conventional image editor like gimp/photoshop
    in which you use your mouse to drag and drop
  </p>
</article>
<script src="/static/js/site.js"></script>
<script>
    site_global_rendering().finally(() => hidePageLoadOverlay())
</script>
</html>
