<!DOCTYPE html>
<html lang="en">
<head>
    <script>
    (function () {
        var theme = 'dark'
        try {
            if (localStorage.getItem('theme') === 'light') {
                theme = 'light'
            }
    } catch (e) {
    }
    var bg = theme === 'light' ? '#fcfdf7' : '#383838'
    document.documentElement.dataset.theme = theme
    document.documentElement.style.setProperty('--page-load-overlay-bg', bg)
})()
    </script>
    <title>Home</title>
    <meta name="google-site-verification" content="gaM3C45hv4VJ_hib8CIvTXuOBE0m4PhercsYA4tHg3g" />
</head>
<body>
<div id="page_load_overlay" style="position:fixed;inset:0;z-index:2147483647;pointer-events:none;opacity:1;transition:opacity 220ms ease, visibility 0s linear 220ms;background:var(--page-load-overlay-bg, #383838);"></div>
<article>

    <ul id="posts"></ul>
</article>
<script src="/static/js/site.js"></script>

<script>
  async function page_specific_stuff() {
    const postsEl = document.querySelector('#posts')
    const posts = PageResources.posts
    posts
        .filter(p => !p.draft)
        .forEach(post => {
      let tags = ''
      post.tags.forEach(tag => {
        tags += `<a class="tag_element" href="/tags/${tag_slug(tag)}.html">${tag}</a> `
      })
      const el = make_element(`
<li><div class="post_card">
<a style="display: block;" href="${post.url}"><h3>${post.title}</h3></a>
<div>${tags}</div>
<div class="post_description">${post.description}</div>
</div></li>`)
      postsEl.prepend(el)
    })
  }
</script>

<script>
    (async function () {
        try {
            await site_global_rendering()
            await page_specific_stuff()
        } finally {
            hidePageLoadOverlay()
        }
    })()
</script>

<style>
    #posts {
        margin-top: 2em;
        padding: 0;
        list-style-type: none;
    }

</style>
</html>
