      var theme = 'dark'
      try {
          if (localStorage.getItem('theme') === 'light') {
              theme = 'light'
          }
      } catch (e) {
      }
      var bg = theme === 'light' ? '#fcfdf7' : '#383838'
      document.documentElement.dataset.theme = theme
      document.documentElement.style.setProperty('--page-load-overlay-bg', bg)
  })()
