<!DOCTYPE html>
<html lang="en">
<head>
    <script>
    (function () {
        var theme = 'dark'
        try {
            if (localStorage.getItem('theme') === 'light') {
                theme = 'light'
            }
        } catch (e) {
        }
        var bg = theme === 'light' ? '#fcfdf7' : '#383838'
        document.documentElement.dataset.theme = theme
        document.documentElement.style.setProperty('--page-load-overlay-bg', bg)
    })()
    </script>
    <title>Projects</title>
</head>
<body>
<div id="page_load_overlay" style="position:fixed;inset:0;z-index:2147483647;pointer-events:none;opacity:1;transition:opacity 220ms ease, visibility 0s linear 220ms;background:var(--page-load-overlay-bg, #383838);"></div>
<article>
    <ul id="proj_list">
    </ul>
</article>
<script src="/static/js/site.js"></script>

<script>
  async function page_specific_stuff() {
    const projects = await fetch('/collections/projects.json').then(res => res.json())
    const list = document.querySelector('#proj_list')
    projects.forEach(
      (post) => {
        const container = make_element(`
<li><div class="post_card">
<a style="display: block;" href="${post.url}"><h3>${post.name}</h3></a>
<div class="post_description">${post.description}</div>
</div></li>`);
        list.appendChild(container)
      }
    )
  }
</script>

<script>
  Promise.all([site_global_rendering(), page_specific_stuff()])
    .finally(() => hidePageLoadOverlay())
</script>

<style>
    ul {
        width: 100%;
        max-width: 100%;
        list-style: none;
        padding: 0;
    }
    ul > * {
        width: 100%;
        margin: 0;
    }
    ul > .title {
        font-size: 1.5em;
    }
    .divider {
        width: 10em;
        margin: auto;
        height: 1px;
        background: grey;
    }
</style>
</body>
</html>
