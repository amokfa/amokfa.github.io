<!DOCTYPE html>
<html lang="en">
<head>
    <script>
    (function () {
        var theme = 'dark'
        try {
            if (localStorage.getItem('theme') === 'light') {
                theme = 'light'
            }
        } catch (e) {
        }
        var bg = theme === 'light' ? '#fcfdf7' : '#383838'
        document.documentElement.dataset.theme = theme
        document.documentElement.style.setProperty('--page-load-overlay-bg', bg)
    })()
    </script>
    <title>Tags</title>
</head>
<body>
<div id="page_load_overlay" style="position:fixed;inset:0;z-index:2147483647;pointer-events:none;opacity:1;transition:opacity 220ms ease, visibility 0s linear 220ms;background:var(--page-load-overlay-bg, #383838);"></div>
<article>
    <ul class="tags_list">
    </ul>
</article>
<script src="/static/js/site.js"></script>

<script>
  async function page_specific_stuff() {
    const posts = await fetch('/collections/posts.json').then(res => res.json())
    const tagsCount = {}
    posts.forEach(p => p.tags.forEach(tag => {
      if (tagsCount[tag]) {
        tagsCount[tag]++
      } else {
        tagsCount[tag] = 1
      }
    }))
    const tags = Object.keys(tagsCount)
    tags.sort((a, b) => tagsCount[b] - tagsCount[a])
    const list = document.querySelector('ul')
    tags.forEach(tag => {
      list.appendChild(make_element(`<li><a class="tag_element" href="/tags/${tag_slug(tag)}.html"><div>${tag} <span>${tagsCount[tag]}</span></div></a></li>`))
    })
  }
</script>

<script>
  Promise.all([site_global_rendering(), page_specific_stuff()])
    .finally(() => hidePageLoadOverlay())
</script>

<style>
    ul {
        flex-direction: column;
    }
    .tag_element span {
        margin-left: 1em;
        color: #196d00;
    }
    body.dark .tag_element span {
        color: #3bfd04;
    }
    #page_content .tags_list li {
        margin: 0;
    }
</style>

</html>
